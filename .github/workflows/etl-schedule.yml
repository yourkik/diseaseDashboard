name: Daily ETL Data Pipeline

on:
  schedule:
    # 매일 한국 시간 새벽 1시 (UTC 기준 16:00)에 실행
    - cron: '0 16 * * *'
  workflow_dispatch: # 사용자가 GitHub 웹페이지에서 수동으로 실행할 수 있는 버튼 활성화

jobs:
  run-etl-and-dbt:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary python-dotenv dbt-postgres

      - name: Run Python ETL (Extract & Load)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          echo "Starting KDCA Data ETL..."
          python kdca_full_etl.py
          echo "ETL Completed Successfully."

      - name: Run dbt (Transform)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        working-directory: ./disease_dbt
        run: |
          echo "Starting dbt Build..."
          # profiles.yml이 올바르게 환경 변수를 읽도록 실행
          dbt build --profiles-dir .
          echo "dbt Build Completed Successfully."
